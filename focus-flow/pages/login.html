<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Focus Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/pages/landing.css">
    <link rel="stylesheet" href="../assets/css/pages/auth.css">
</head>
<body class="auth-page">
    <a href="../index.html" class="auth-header">Focus<span style="color: var(--primary-color)">Flow</span></a>
    
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Please enter your details to sign in.</p>

        <form id="auth-form">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i data-feather="mail" class="input-icon"></i>
                    <input type="email" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <label style="margin-bottom: 0;">Password</label>
                    <a href="#" class="auth-redirect" style="margin: 0; font-size: 12px;">Forgot Password?</a>
                </div>
                <div class="input-wrapper">
                    <i data-feather="lock" class="input-icon"></i>
                    <input type="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
        </form>

        <div class="auth-redirect">
            New to FocusFlow? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/session.js"></script>
    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
