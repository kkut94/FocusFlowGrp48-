<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Focus Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/pages/landing.css">
    <link rel="stylesheet" href="../assets/css/pages/auth.css">
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>
<body class="auth-page">
    <a href="../index.html" class="auth-header">Focus<span style="color: var(--primary-color)">Flow</span></a>

    <div class="auth-card">
        <h1>Create Account</h1>
        <p>Join FocusFlow to start your journey today</p>

        <form id="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i data-feather="user" class="input-icon"></i>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i data-feather="mail" class="input-icon"></i>
                    <input type="email" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i data-feather="lock" class="input-icon"></i>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i data-feather="shield" class="input-icon"></i>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>

        <div class="auth-redirect">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/session.js"></script>
    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
